<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Church Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&display=swap');

  :root{
    --ink:#201A3D;
    --ink-soft:#6B6580;
    --paper:#F1F0F6;
    --paper-raised:#FFFFFF;
    --line:#E2E0EA;
    --navy:#241B57;
    --navy-deep:#160F3D;
    --gold:#C99A3B;
    --gold-soft:#F6ECD3;
    --good:#1E7145;
    --good-soft:#E3F1E8;
    --warn:#C99A3B;
    --warn-soft:#F6ECD3;
    --bad:#B0392F;
    --bad-soft:#F7DFDB;
    --spring:#7A9B76;
    --spring-soft:#E4EBE1;
    --summer:#C9932E;
    --summer-soft:#F3E7CC;
    --autumn:#B85C38;
    --autumn-soft:#F1DDCF;
    --winter:#4A6C8C;
    --winter-soft:#DEE6ED;
    --radius:10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Calibri','Carlito',sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--summer-soft);}

  .app{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}

  /* ---------- Header ---------- */
  .masthead{
    display:flex;justify-content:space-between;align-items:center;
    margin:-28px -20px 0;padding:18px 24px;
    background:var(--navy);color:#fff;
    border-bottom:4px solid var(--gold);
    flex-wrap:wrap;gap:12px;
  }
  .masthead h1{
    font-family:'Calibri','Carlito',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.01em;
    margin:0;color:#fff;
  }
  .masthead .sub{
    font-family:'Calibri','Carlito',sans-serif;font-size:11px;color:rgba(255,255,255,.6);
    text-transform:uppercase;letter-spacing:0.08em;
  }
  .who{
    display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.85);
  }
  .who button{
    font-family:'Calibri','Carlito',sans-serif;font-size:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.35);
    border-radius:6px;padding:5px 10px;cursor:pointer;color:#fff;
  }
  .who button:hover{background:rgba(255,255,255,.2);}

  /* ---------- Term ribbon (signature element) ---------- */
  .ribbon{
    display:flex;gap:6px;margin:18px 0 22px;
  }
  .tab{
    flex:1;position:relative;
    padding:10px 14px 12px;
    border:1px solid var(--line);border-bottom:none;
    border-radius:8px 8px 0 0;
    background:var(--paper-raised);
    cursor:pointer;
    font-family:'Calibri','Carlito',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.09em;
    color:var(--ink-soft);
    transition:transform .15s ease;
  }
  .tab .label{display:block;font-family:'Calibri','Carlito',sans-serif;font-size:17px;text-transform:none;letter-spacing:0;color:var(--ink);margin-top:4px;}
  .tab .months{opacity:.7;}
  .tab.active{transform:translateY(-4px);box-shadow:0 -3px 0 0 var(--tab-color) inset, 0 2px 6px rgba(0,0,0,0.08);}
  .tab.current::after{
    content:'today';position:absolute;top:-9px;right:10px;
    background:var(--tab-color);color:#fff;font-size:9px;padding:2px 7px;border-radius:20px;
    font-family:'Calibri','Carlito',sans-serif;letter-spacing:0.03em;
  }
  .tab[data-term="spring"]{--tab-color:var(--spring);}
  .tab[data-term="summer"]{--tab-color:var(--summer);}
  .tab[data-term="autumn"]{--tab-color:var(--autumn);}
  .tab[data-term="winter"]{--tab-color:var(--winter);}
  .tab.active[data-term="spring"]{background:var(--spring-soft);}
  .tab.active[data-term="summer"]{background:var(--summer-soft);}
  .tab.active[data-term="autumn"]{background:var(--autumn-soft);}
  .tab.active[data-term="winter"]{background:var(--winter-soft);}
  .ribbon-bar{height:3px;background:var(--navy);margin-top:-1px;margin-bottom:20px;}

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    margin-bottom:18px;
  }
  .view-toggle{display:flex;border:1px solid var(--navy);border-radius:8px;overflow:hidden;}
  .view-toggle button{
    font-family:'Calibri','Carlito',sans-serif;font-weight:600;font-size:13px;
    background:var(--paper-raised);border:none;padding:8px 16px;cursor:pointer;color:var(--ink-soft);
  }
  .view-toggle button.active{background:var(--navy);color:#fff;}
  .nav-group{display:flex;align-items:center;gap:10px;}
  .nav-group button{
    background:none;border:1px solid var(--line);border-radius:6px;width:32px;height:32px;
    cursor:pointer;font-size:15px;color:var(--ink);
  }
  .nav-group button:hover{background:var(--paper-raised);}
  .month-label{font-family:'Calibri','Carlito',sans-serif;font-size:20px;min-width:170px;text-align:center;}
  .add-btn{
    font-family:'Calibri','Carlito',sans-serif;font-weight:600;font-size:13px;
    background:var(--navy);color:#fff;border:none;border-radius:8px;
    padding:9px 16px;cursor:pointer;
  }
  .add-btn:hover{opacity:.88;}

  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .chip{
    font-family:'Calibri','Carlito',sans-serif;font-size:11px;letter-spacing:0.03em;
    padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:var(--paper-raised);
    cursor:pointer;color:var(--ink-soft);
  }
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}

  /* ---------- Calendar ---------- */
  .cal-grid{
    display:grid;grid-template-columns:repeat(7,1fr);
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper-raised);
  }
  .cal-dow{
    padding:8px 0;text-align:center;font-family:'Calibri','Carlito',sans-serif;font-size:10px;
    text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);
    border-bottom:1px solid var(--line);background:var(--paper);
  }
  .cal-cell{
    min-height:98px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:6px;position:relative;
  }
  .cal-cell:nth-child(7n){border-right:none;}
  .cal-cell.other-month{opacity:.35;}
  .cal-cell.today{background:var(--gold-soft);}
  .cal-cell.busy{box-shadow:inset 0 0 0 2px var(--warn);}
  .cal-date{font-family:'Calibri','Carlito',sans-serif;font-size:11px;color:var(--ink-soft);}
  .cal-events{margin-top:4px;display:flex;flex-direction:column;gap:3px;}
  .ev-pill{
    font-size:10.5px;padding:2px 6px;border-radius:5px;cursor:pointer;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;
  }
  .ev-pill.small-group{background:var(--spring);}
  .ev-pill.prayer{background:var(--winter);}
  .ev-pill.service{background:var(--navy);}
  .ev-pill.event{background:var(--autumn);}
  .ev-pill.tag{color:#fff;}
  .ev-pill.tag.dominant{font-weight:700;box-shadow:0 0 0 1px rgba(255,255,255,.5) inset;}
  .busy-flag{
    display:inline-block;background:var(--warn-soft);color:var(--warn);font-size:9.5px;font-weight:700;
    padding:1px 6px;border-radius:20px;margin-left:5px;text-transform:uppercase;letter-spacing:.03em;vertical-align:middle;
  }
  .list-tag-chip{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;}
  .list-tag-chip.dominant{font-weight:800;}

  /* ---------- List view ---------- */
  .list-month{margin-bottom:26px;}
  .list-month h3{
    font-family:'Calibri','Carlito',sans-serif;font-size:19px;margin:0 0 10px;
    border-bottom:1px solid var(--line);padding-bottom:6px;
  }
  .list-row{
    display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px;
    cursor:pointer;
  }
  .list-row.indented{margin-left:34px;padding-left:14px;border-left:2px solid var(--line);}
  .list-row:hover{background:var(--paper-raised);}
  .list-date{
    font-family:'Calibri','Carlito',sans-serif;font-size:12px;color:var(--ink-soft);min-width:76px;
  }
  .list-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .list-dot.small-group{background:var(--spring);}
  .list-dot.prayer{background:var(--winter);}
  .list-dot.service{background:var(--navy);}
  .list-dot.event{background:var(--autumn);}
  .list-title{font-weight:600;font-size:14px;flex:1;}
  .list-meta{font-size:11.5px;color:var(--ink-soft);}
  .empty{
    text-align:center;padding:50px 20px;color:var(--ink-soft);font-family:'Calibri','Carlito',sans-serif;font-size:17px;
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(43,42,40,0.45);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:20px;
  }
  .modal{
    background:var(--paper-raised);border-radius:12px;padding:26px;max-width:420px;width:100%;
    box-shadow:0 12px 32px rgba(0,0,0,0.2);
    max-height:90vh;overflow-y:auto;
  }
  .modal h2{font-family:'Calibri','Carlito',sans-serif;font-size:22px;margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:600;}
  .field input,.field select,.field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;
    font-family:'Calibri','Carlito',sans-serif;font-size:14px;background:#fff;color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:60px;}
  .cat-picker{display:flex;gap:6px;flex-wrap:wrap;}
  .cat-opt{
    padding:7px 12px;border-radius:20px;border:1px solid var(--line);cursor:pointer;font-size:12.5px;
    background:#fff;
  }
  .cat-opt.on{color:#fff;border-color:transparent;}
  .cat-opt[data-cat="small-group"].on{background:var(--spring);}
  .cat-opt[data-cat="prayer"].on{background:var(--winter);}
  .cat-opt[data-cat="service"].on{background:var(--summer);color:var(--ink);}
  .cat-opt[data-cat="event"].on{background:var(--autumn);}
  .modal-actions{display:flex;justify-content:space-between;margin-top:20px;gap:10px;}
  .btn{padding:9px 16px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:'Calibri','Carlito',sans-serif;font-weight:600;font-size:13px;}
  .btn.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
  .btn.danger{color:var(--autumn);border-color:var(--autumn);}
  .pin-dots{display:flex;gap:8px;justify-content:center;margin:14px 0;}
  .pin-dots span{width:12px;height:12px;border-radius:50%;border:1px solid var(--line);}
  .pin-dots span.filled{background:var(--navy);}
  .user-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .user-chip{
    padding:8px 14px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:13px;background:#fff;
  }
  .user-chip:hover{background:var(--paper-raised);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .keypad button{
    padding:14px 0;font-size:17px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;
  }
  .keypad button:hover{background:var(--paper-raised);}
  .error-text{color:var(--autumn);font-size:12px;margin-top:6px;}
  .notice{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.4;}

  /* ---------- Dashboard (rhythm timeline) ---------- */
  .app.wide{max-width:1240px;}
  .weeks-timeline{display:flex;flex-direction:column;gap:12px;}
  .week-card{
    background:var(--paper-raised);border:1px solid var(--line);border-left:5px solid var(--term-color,var(--ink));
    border-radius:10px;padding:16px 18px;display:flex;gap:22px;flex-wrap:wrap;
  }
  .week-card.editing{border-left-style:dashed;background:#fff;}
  .wc-left{min-width:96px;flex-shrink:0;}
  .wc-week{font-family:'Calibri','Carlito',sans-serif;font-size:10.5px;text-transform:uppercase;letter-spacing:0.09em;color:var(--ink-soft);}
  .wc-date{font-family:'Calibri','Carlito',sans-serif;font-size:21px;line-height:1.15;margin-top:3px;}
  .wc-occasion{margin-top:9px;display:inline-block;background:var(--summer-soft);color:var(--ink);font-size:10.5px;
    padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:0.02em;}
  .wc-main{flex:1;min-width:240px;}
  .wc-series{font-family:'Calibri','Carlito',sans-serif;font-size:18px;margin:0 0 6px;}
  .wc-series.empty{color:var(--ink-soft);font-style:italic;font-size:15px;}
  .wc-post{font-size:12.5px;color:var(--ink-soft);white-space:pre-line;margin-bottom:9px;line-height:1.5;}
  .wc-mid{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
  .wc-rhythm-pill{font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px;color:#fff;}
  .wc-rhythm-pill.dominant{font-weight:800;box-shadow:0 0 0 1px rgba(255,255,255,.5) inset;}
  .mw-rows{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .mw-row{display:flex;flex-direction:column;gap:7px;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff;}
  .mw-tags-line{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .mw-meta-line{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .mw-meta-line select,.mw-tags-line select{flex:1.1;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;background:#fff;color:var(--ink);}
  .mw-meta-line input,.mw-tags-line input{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;background:#fff;color:var(--ink);}
  .mw-meta-line button,.mw-tags-line button{border:none;background:none;color:var(--bad);cursor:pointer;font-size:14px;padding:2px 4px;}
  .mw-tag-toggle{
    border:1px solid var(--line)!important;background:#fff!important;color:var(--ink-soft)!important;
    border-radius:20px;font-size:12px!important;padding:5px 12px!important;cursor:pointer;white-space:nowrap;
    font-family:'Calibri','Carlito',sans-serif;font-weight:600;flex:0 0 auto!important;
  }
  .mw-tag-toggle:hover{background:var(--paper)!important;}
  .mw-tag-toggle-new{border-style:dashed!important;color:var(--ink-soft)!important;}
  .mw-tag-chip{
    display:inline-flex;align-items:center;color:#fff;border-radius:20px;font-size:12px;
    padding:5px 12px;white-space:nowrap;font-family:'Calibri','Carlito',sans-serif;font-weight:600;
  }
  .mw-tags-edit,.mw-tags-done{
    border:1px dashed var(--line)!important;background:none!important;color:var(--ink-soft)!important;
    border-radius:20px;font-size:11.5px!important;padding:5px 10px!important;cursor:pointer;white-space:nowrap;
    font-family:'Calibri','Carlito',sans-serif;font-weight:600;flex:0 0 auto!important;
  }
  .mw-tags-edit:hover,.mw-tags-done:hover{background:var(--paper)!important;color:var(--ink)!important;}
  .mw-add{border:1px dashed var(--line);background:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--ink-soft);font-family:'Calibri','Carlito',sans-serif;font-weight:600;}
  .mw-add:hover{background:var(--paper);color:var(--ink);}
  .mw-cancel-newtag{border:1px solid var(--line)!important;background:#fff!important;color:var(--ink-soft)!important;border-radius:6px;font-size:11px!important;padding:5px 8px!important;white-space:nowrap;font-family:'Calibri','Carlito',sans-serif;flex:0 0 auto!important;}
  .mw-cancel-newtag:hover{background:var(--paper)!important;color:var(--ink)!important;}
  .mw-meta-line select.mw-repeat-freq{flex:0 0 auto;width:auto;min-width:120px;}
  .mw-meta-line input.mw-date{flex:0 0 auto;width:auto;}
  .rr-tag-toggle{
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    border-radius:20px;font-size:11.5px;padding:4px 11px;cursor:pointer;white-space:nowrap;
    font-family:'Calibri','Carlito',sans-serif;font-weight:600;
  }
  .rr-tag-toggle:hover{background:var(--paper);}
  .rr-card{display:flex;flex-direction:column;gap:4px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;}
  .rr-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;}
  .rr-line select,.rr-line input{padding:6px 7px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:#fff;color:var(--ink);}
  .rr-line input[type="number"]{width:52px;text-align:center;}
  .rr-line .rr-label{font-size:11px;color:var(--ink-soft);white-space:nowrap;}
  .rr-line .rr-name{flex:1;font-size:12.5px;font-weight:600;min-width:100px;}
  .settings-btn{background:rgba(255,255,255,.08)!important;}
  .settings-section{margin-bottom:18px;}
  .settings-section h4{font-family:'Calibri','Carlito',sans-serif;font-size:15px;margin:0 0 10px;}
  .tag-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;}
  .tag-row input[type="text"]{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;}
  .tag-row select{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;}
  .tag-row button{border:none;background:none;color:var(--bad);cursor:pointer;font-size:14px;}
  .aud-swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .wc-commencing{font-family:'Calibri','Carlito',sans-serif;font-size:11px;color:var(--ink-soft);}
  .wc-happening{font-size:12.5px;white-space:pre-line;line-height:1.5;}
  .wc-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
  .wc-actions button{
    border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;
    font-family:'Calibri','Carlito',sans-serif;font-weight:600;color:var(--ink-soft);
  }
  .wc-actions button:hover{background:var(--paper);color:var(--ink);}
  .wc-actions button.danger{color:var(--autumn);border-color:var(--autumn);}
  .wc-edit-grid{flex:1;min-width:260px;display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  .wc-edit-grid .full{grid-column:1/3;}
  .wc-edit-grid label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .wc-edit-grid input,.wc-edit-grid textarea{
    width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-family:'Calibri','Carlito',sans-serif;font-size:13px;background:#fff;color:var(--ink);
  }
  .wc-edit-grid textarea{resize:vertical;min-height:44px;}
  .dash-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .dash-toolbar .term-label{font-family:'Calibri','Carlito',sans-serif;font-size:11.5px;color:var(--ink-soft);letter-spacing:.06em;}

  @media (max-width:640px){
    .masthead h1{font-size:26px;}
    .tab .label{font-size:14px;}
    .cal-cell{min-height:64px;}
    .cal-dow{font-size:8.5px;}
    .week-card{flex-direction:column;}
    .wc-actions{flex-direction:row;}
  }
</style>
</head>
<body>
<div class="app" id="app">Loading…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

const CATS = {
  'small-group':{label:'Small Group'},
  'prayer':{label:'Prayer Service'},
  'service':{label:'Service'},
  'event':{label:'Event'}
};
const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// "Whole Church" tags stay tied to the church's own brand colour so they read as the dominant/default
// tag at a glance; every other audience gets a distinct colour from the palette below (or a custom
// one the user picks in Settings).
const DOMINANT_TAG_COLOR = '#241B57';
const TAG_PALETTE = ['#4A6C8C','#B85C38','#7A9B76','#8B5FBF','#C99A3B','#B0392F','#2E8B8B','#5C8A99','#A6763D','#6B8E4E','#C2688C','#3D6B99','#9B6B47','#5E7A3D'];

const DEFAULT_AUDIENCES = [
  {name:'Whole Church', color:DOMINANT_TAG_COLOR},
  {name:'Chapter', color:'#4A6C8C'},
  {name:'Leadership', color:'#B85C38'},
  {name:'Core Team', color:'#5E7A3D'},
  {name:'Service Team', color:'#C2688C'},
  {name:'Alpha Team', color:'#7A9B76'},
  {name:'Cleaning Team', color:'#8B5FBF'},
  {name:'Connections', color:'#C99A3B'},
  {name:'Foodbank Team', color:'#B0392F'},
  {name:'Host', color:'#2E8B8B'},
  {name:'Kids', color:'#5C8A99'},
  {name:'Locking Up Team', color:'#A6763D'},

function audienceObj(name){ return state.audiences.find(a=>a.name===name); }
// Every audience's colour is stored and user-editable in Settings. If an audience was deleted or
// isn't found for some reason, fall back to a deterministic palette pick so it's still consistent.
function audienceColor(name){
  const a = audienceObj(name);
  if(a && a.color) return a.color;
  let h=0; const s=name||'';
  for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return TAG_PALETTE[h % TAG_PALETTE.length];
}
function isDominantAudience(name){ return name === 'Whole Church'; }
function tagById(id){ return state.tags.find(t=>t.id===id); }

// Does a recurring rhythm template land on the given date, honouring frequency, interval and end conditions?
// (Outlook-style: Weekly/Monthly, "every N", and Never/After N occurrences/On a date.)
function rhythmAppliesToDate(r, date){
  const start = parseISO(r.startDate);
  if(date < start) return false;
  const freq = r.freq || 'weekly';
  const interval = Math.max(1, r.interval || 1);
  const endType = r.endType || (r.endDate ? 'byDate' : 'never');
  if(endType === 'byDate' && r.endDate && date > parseISO(r.endDate)) return false;

  let occurrenceIndex;
  if(freq === 'monthly'){
    const diffMonths = (date.getFullYear()-start.getFullYear())*12 + (date.getMonth()-start.getMonth());
    if(diffMonths < 0 || diffMonths % interval !== 0) return false;
    if(date.getDate() !== start.getDate()) return false;
    occurrenceIndex = diffMonths / interval;
  } else {
    const diffDays = Math.round((date - start)/(1000*60*60*24));
    if(diffDays < 0 || diffDays % (7*interval) !== 0) return false;
    occurrenceIndex = diffDays / (7*interval);
  }
  if(endType === 'after' && r.occurrenceCount && occurrenceIndex >= r.occurrenceCount) return false;
  return true;
}

// Merge recurring rhythm templates (minus this week's exclusions) with this week's own one-off midweek items.
// Each item now carries tagIds (can be more than one, e.g. Worship + Production) and its own actual
// date — recurring items derive theirs from the week's commencing date plus a day offset, one-off
// items can have any date picked directly.
function effectiveMidweek(wk){
  const items = [];
  const wkDate = wk.weekCommencing ? parseISO(wk.weekCommencing) : (wk.sundayDate ? parseISO(wk.sundayDate) : null);
  const excluded = wk.excludedRecurring || [];
  if(wkDate){
    state.recurringRhythms.forEach(r=>{
      if((r.slot||'midweek')!=='midweek') return;
      if(rhythmAppliesToDate(r, wkDate) && !excluded.includes(r.id)){
        const offset = r.dayOffset || 0;
        const actualDate = new Date(wkDate.getFullYear(), wkDate.getMonth(), wkDate.getDate()+offset);
        items.push({
          id:'rec-'+r.id+'-'+wk.id, tagIds:r.tagIds || (r.tagId?[r.tagId]:[]), note:r.note||'',
          recurringId:r.id, date:isoDate(actualDate)
        });
      }
    });
  }
  (wk.midweek||[]).forEach(m=> items.push({
    ...m,
    tagIds: m.tagIds || (m.tagId?[m.tagId]:[]),
    date: m.date || wk.weekCommencing
  }));
  return items;
}

// Same idea as effectiveMidweek, but anchored to the Sunday itself rather than the
// week-commencing Monday — for things happening after the service that day (or nearby).
function effectivePostService(wk){
  const items = [];
  const anchor = wk.sundayDate ? parseISO(wk.sundayDate) : null;
  const excluded = wk.excludedRecurring || [];
  if(anchor){
    state.recurringRhythms.forEach(r=>{
      if((r.slot||'midweek')!=='postService') return;
      if(rhythmAppliesToDate(r, anchor) && !excluded.includes(r.id)){
        const offset = r.dayOffset || 0;
        const actualDate = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate()+offset);
        items.push({
          id:'psrec-'+r.id+'-'+wk.id, tagIds:r.tagIds||[], note:r.note||'',
          recurringId:r.id, date:isoDate(actualDate)
        });
      }
    });
  }
  (wk.postService||[]).forEach(m=> items.push({
    ...m,
    tagIds: m.tagIds || [],
    date: m.date || wk.sundayDate
  }));
  return items;
}

// Date range for a given term key, anchored to a reference date (handles winter spanning year-end).
function termDateRange(termKey, refDate){
  function rangeForYear(y){
    if(termKey==='winter') return [new Date(y,11,1), new Date(y+1,1,28)];
    const bounds = {spring:[2,4], summer:[5,7], autumn:[8,10]}[termKey];
    return [new Date(y,bounds[0],1), new Date(y,bounds[1]+1,0)];
  }
  const y = refDate.getFullYear();
  let [s,e] = rangeForYear(y);
  if(e < refDate) [s,e] = rangeForYear(y+1); // this year's instance already finished — use next year's
  return [s,e];
}

function allSundaysInRange(start, end){
  const out = [];
  let d = new Date(start);
  const offsetToSun = (7 - d.getDay()) % 7;
  d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + (d.getDay()===0?0:offsetToSun));
  while(d <= end){
    out.push(new Date(d));
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+7);
  }
  return out;
}

function termOf(date){
  const m = date.getMonth(); // 0-11
  if([2,3,4].includes(m)) return 'spring';
  if([5,6,7].includes(m)) return 'summer';
  if([8,9,10].includes(m)) return 'autumn';
  return 'winter';
}
function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  // fallback for older browsers without crypto.randomUUID
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
    return v.toString(16);
  });
}
function isoDate(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }

async function loadData(){
  const [usersRes, audRes, tagsRes, weeksRes, rrRes, evRes] = await Promise.all([
    sb.from('users').select('*'),
    sb.from('audiences').select('*'),
    sb.from('tags').select('*'),
    sb.from('weeks').select(`
      id, occasion, sunday_date, sunday_series, week_commencing, happening,
      week_midweek_items ( id, note, item_date, week_midweek_item_tags ( tag_id ) ),
      week_post_service_items ( id, note, item_date, week_post_service_item_tags ( tag_id ) ),
      week_excluded_recurring ( recurring_rhythm_id )
    `).order('sunday_date'),
    sb.from('recurring_rhythms').select(`
      id, note, start_date, end_date, freq, interval, end_type, occurrence_count, day_offset, slot,
      recurring_rhythm_tags ( tag_id )
    `),
    sb.from('events').select('*')
  ]);

  [usersRes, audRes, tagsRes, weeksRes, rrRes, evRes].forEach(r=>{
    if(r.error) console.error('Supabase load error:', r.error);
  });

  state.users = (usersRes.data||[]).map(u=>({id:u.id, name:u.name, pin:u.pin}));

  state.audiences = (audRes.data||[]).map(a=>({name:a.name, color:a.color}));
  if(!state.audiences.length){
    state.audiences = DEFAULT_AUDIENCES.map(a=>({...a}));
    await saveAudiences(state.audiences);
  }
  ['Core Team','Service Team'].forEach(name=>{
    if(!state.audiences.some(a=>a.name===name)){
      const def = DEFAULT_AUDIENCES.find(d=>d.name===name);
      const a = {name, color: def ? def.color : TAG_PALETTE[state.audiences.length % TAG_PALETTE.length]};
      state.audiences.push(a);
      saveAudiences(a);
    }
  });

  state.tags = (tagsRes.data||[]).map(t=>({id:t.id, name:t.name, audience:t.audience}));
  if(!state.tags.length){
    state.tags = DEFAULT_TAGS.map(t=>({...t, id: uid()}));
    await saveTags(state.tags);
  }

  state.weeks = (weeksRes.data||[]).map(w=>({
    id: w.id,
    occasion: w.occasion || '',
    sundayDate: w.sunday_date,
    sundaySeries: w.sunday_series || '',
    weekCommencing: w.week_commencing,
    happening: w.happening || '',
    midweek: (w.week_midweek_items||[]).map(m=>({
      id: m.id, note: m.note||'', date: m.item_date,
      tagIds: (m.week_midweek_item_tags||[]).map(t=>t.tag_id)
    })),
    postService: (w.week_post_service_items||[]).map(m=>({
      id: m.id, note: m.note||'', date: m.item_date,
      tagIds: (m.week_post_service_item_tags||[]).map(t=>t.tag_id)
    })),
    excludedRecurring: (w.week_excluded_recurring||[]).map(e=>e.recurring_rhythm_id)
  }));
  state.weeks.sort((a,b)=> a.sundayDate < b.sundayDate ? -1 : 1);

  state.recurringRhythms = (rrRes.data||[]).map(r=>({
    id: r.id, note: r.note||'', startDate: r.start_date, endDate: r.end_date,
    freq: r.freq, interval: r.interval, endType: r.end_type, occurrenceCount: r.occurrence_count,
    dayOffset: r.day_offset||0, tagIds: (r.recurring_rhythm_tags||[]).map(t=>t.tag_id)
  }));

  state.events = (evRes.data||[]).map(e=>({
    id: e.id, title: e.title, category: e.category, date: e.event_date,
    recurrence: e.recurrence, recurrenceInterval: e.recurrence_interval,
    recurrenceEndType: e.recurrence_end_type, recurrenceCount: e.recurrence_count,
    recurrenceEnd: e.recurrence_end, notes: e.notes||'', createdBy: e.created_by
  }));

  state.loaded = true;
}

// ---------- Save / delete helpers ----------
// Each accepts a single item, an array, or nothing (meaning "everything currently
// in local state") — and only ever touches the rows it's given, upserting them.
// Deletions are always explicit, separate calls at the point of removal, so one
// person's edit can never silently wipe out another person's concurrent change.

async function saveUsers(userOrUsers){
  const rows = userOrUsers ? (Array.isArray(userOrUsers)?userOrUsers:[userOrUsers]) : state.users;
  const payload = rows.map(u=>({id:u.id, name:u.name, pin:u.pin}));
  const { error } = await sb.from('users').upsert(payload);
  if(error) console.error('save users failed', error);
}

async function saveTags(tagOrTags){
  const rows = tagOrTags ? (Array.isArray(tagOrTags)?tagOrTags:[tagOrTags]) : state.tags;
  const payload = rows.map(t=>({id:t.id, name:t.name, audience:t.audience}));
  const { error } = await sb.from('tags').upsert(payload);
  if(error) console.error('save tags failed', error);
}

async function saveAudiences(audOrAuds){

async function saveRecurring(rOrRs){
  const rows = rOrRs ? (Array.isArray(rOrRs)?rOrRs:[rOrRs]) : state.recurringRhythms;
  for(const row of rows){
    const payload = {
      id: row.id, note: row.note||'', start_date: row.startDate, end_date: row.endDate||null,
      freq: row.freq, interval: row.interval, end_type: row.endType,
      occurrence_count: row.occurrenceCount||null, day_offset: row.dayOffset||0, slot: row.slot||'midweek'
    };
    const { error } = await sb.from('recurring_rhythms').upsert(payload);
    if(error){ console.error('save recurring failed', error); continue; }
    // resync only THIS rhythm's tag links — scoped, doesn't touch any other rhythm
    await sb.from('recurring_rhythm_tags').delete().eq('recurring_rhythm_id', row.id);
    const tagRows = (row.tagIds||[]).map(tid=>({recurring_rhythm_id:row.id, tag_id:tid}));
    if(tagRows.length){
      const { error: tagErr } = await sb.from('recurring_rhythm_tags').insert(tagRows);
      if(tagErr) console.error('save recurring tags failed', tagErr);
    }
  }
}
async function deleteRecurringRemote(id){
  const { error } = await sb.from('recurring_rhythms').delete().eq('id', id);
  if(error) console.error('delete recurring failed', error);
}

async function saveWeeks(weekOrWeeks){
  const rows = weekOrWeeks ? (Array.isArray(weekOrWeeks)?weekOrWeeks:[weekOrWeeks]) : state.weeks;
  for(const w of rows){
    const payload = {
      id: w.id, occasion: w.occasion||'', sunday_date: w.sundayDate,
      sunday_series: w.sundaySeries||'',
      week_commencing: w.weekCommencing||null, happening: w.happening||''
    };
    const { error } = await sb.from('weeks').upsert(payload);
    if(error){ console.error('save week failed', error); alert('Could not save this week: '+error.message); continue; }
    // resync only THIS week's own midweek items/tags/exclusions — scoped by week_id,
    // safe even if other people are editing other weeks at the same time.
    const { data: existingItems } = await sb.from('week_midweek_items').select('id').eq('week_id', w.id);
    const existingIds = (existingItems||[]).map(i=>i.id);
    if(existingIds.length) await sb.from('week_midweek_items').delete().in('id', existingIds);
    const items = (w.midweek||[]).map(m=>({id:m.id, week_id:w.id, note:m.note||'', item_date:m.date||null}));
    if(items.length){
      const { error: itemErr } = await sb.from('week_midweek_items').insert(items);
      if(itemErr){ console.error('save midweek items failed', itemErr); alert('Could not save midweek activity: '+itemErr.message); }
    }
    const tagRows = [];
    (w.midweek||[]).forEach(m=> (m.tagIds||[]).forEach(tid=> tagRows.push({midweek_item_id:m.id, tag_id:tid})));
    if(tagRows.length){
      const { error: tagErr } = await sb.from('week_midweek_item_tags').insert(tagRows);
      if(tagErr){ console.error('save midweek item tags failed', tagErr); alert('Could not save midweek activity tags: '+tagErr.message); }
    }
    // same scoped resync for post-service items
    const { data: existingPsItems } = await sb.from('week_post_service_items').select('id').eq('week_id', w.id);
    const existingPsIds = (existingPsItems||[]).map(i=>i.id);
    if(existingPsIds.length) await sb.from('week_post_service_items').delete().in('id', existingPsIds);
    const psItems = (w.postService||[]).map(m=>({id:m.id, week_id:w.id, note:m.note||'', item_date:m.date||null}));
    if(psItems.length){
      const { error: psItemErr } = await sb.from('week_post_service_items').insert(psItems);
      if(psItemErr){ console.error('save post-service items failed', psItemErr); alert('Could not save post-service activity: '+psItemErr.message); }
    }
    const psTagRows = [];
    (w.postService||[]).forEach(m=> (m.tagIds||[]).forEach(tid=> psTagRows.push({post_service_item_id:m.id, tag_id:tid})));
    if(psTagRows.length){
      const { error: psTagErr } = await sb.from('week_post_service_item_tags').insert(psTagRows);
      if(psTagErr){ console.error('save post-service tags failed', psTagErr); alert('Could not save post-service activity tags: '+psTagErr.message); }
    }
    await sb.from('week_excluded_recurring').delete().eq('week_id', w.id);
    const exclRows = (w.excludedRecurring||[]).map(rid=>({week_id:w.id, recurring_rhythm_id:rid}));
    if(exclRows.length){
      const { error: exErr } = await sb.from('week_excluded_recurring').insert(exclRows);
      if(exErr) console.error('save week exclusions failed', exErr);
    }
  }
  state.weeks.sort((a,b)=> a.sundayDate < b.sundayDate ? -1 : 1);
}
async function deleteWeekRemote(id){
  const { error } = await sb.from('weeks').delete().eq('id', id);
  if(error) console.error('delete week failed', error);
}

// ---------- Realtime: any change from any browser tab triggers a fresh reload ----------
let refreshTimer = null;
function scheduleRefresh(){
  // debounce — a single edit often touches 2-3 tables at once (e.g. a week plus its
  // midweek items and tags), so wait a moment for the burst to settle before refetching.
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(async ()=>{
    await loadData();
    render();
  }, 400);
}
function subscribeRealtime(){
  const tables = [
    'users','audiences','tags','weeks','week_midweek_items','week_midweek_item_tags',
    'recurring_rhythms','recurring_rhythm_tags','week_excluded_recurring','events'
  ];
  const channel = sb.channel('planner-changes');
  tables.forEach(t=>{
    channel.on('postgres_changes', {event:'*', schema:'public', table:t}, scheduleRefresh);
  });
  channel.subscribe();
}


// ---------- Occurrence expansion for recurring items ----------
function occurrencesInRange(ev, rangeStart, rangeEnd){
  const out = [];
  const start = parseISO(ev.date);
  if(ev.recurrence === 'none'){
    if(start >= rangeStart && start <= rangeEnd) out.push(new Date(start));
    return out;
  }
  const interval = Math.max(1, ev.recurrenceInterval || 1);
  const endType = ev.recurrenceEndType || (ev.recurrenceEnd ? 'byDate' : 'never');
  const hardEnd = (endType==='byDate' && ev.recurrenceEnd) ? parseISO(ev.recurrenceEnd) : new Date(rangeEnd.getFullYear()+2,0,1);
  let cur = new Date(start);
  let idx = 0;
  let guard = 0;
  while(cur <= rangeEnd && cur <= hardEnd && guard < 400){
    if(endType==='after' && ev.recurrenceCount && idx >= ev.recurrenceCount) break;
    if(cur >= rangeStart && cur >= start) out.push(new Date(cur));
    if(ev.recurrence === 'daily') cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+interval);
    else if(ev.recurrence === 'weekly') cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+7*interval);
    else if(ev.recurrence === 'monthly') cur = new Date(cur.getFullYear(), cur.getMonth()+interval, cur.getDate());
    else break;
    idx++;
    guard++;
  }
  return out;
}

function eventsForRange(rangeStart, rangeEnd){
  const items = [];
  state.events.forEach(ev=>{
    const occ = occurrencesInRange(ev, rangeStart, rangeEnd);
    occ.forEach(d=>{
      if(state.termFilter && termOf(d) !== state.termFilter) return;
      if(state.catFilters.size && !state.catFilters.has(ev.category)) return;
      items.push({ev, date:d});
    });
  });
  state.weeks.forEach(wk=>{
    if(wk.sundayDate){
      const d = parseISO(wk.sundayDate);
      if(d >= rangeStart && d <= rangeEnd && (!state.termFilter || termOf(d)===state.termFilter)){
        const cat = 'service';
        if(!state.catFilters.size || state.catFilters.has(cat)){
          items.push({ev:{id:'wk-sun-'+wk.id, title:(wk.occasion||wk.sundaySeries||'Sunday'), category:cat, recurrence:'none', synthetic:true, weekId:wk.id}, date:d});
        }
      }
    }
    if(wk.weekCommencing){
      const mw = effectiveMidweek(wk);
      const busy = mw.length > 1;
      mw.forEach(m=>{
        const itemDate = m.date ? parseISO(m.date) : parseISO(wk.weekCommencing);
        if(itemDate < rangeStart || itemDate > rangeEnd) return;
        if(state.termFilter && termOf(itemDate) !== state.termFilter) return;
        const tags = (m.tagIds||[]).map(tagById).filter(Boolean);
        if(!tags.length) return;
        const title = tags.map(t=>t.name).join(' + ') + (m.note?' — '+m.note:'');
        items.push({ev:{
          id:'wk-mid-'+wk.id+'-'+m.id, title,
          category:'tag', color:audienceColor(tags[0].audience), dominant:tags.some(t=>isDominantAudience(t.audience)),
          tags: tags.map(t=>({name:t.name, color:audienceColor(t.audience), dominant:isDominantAudience(t.audience)})),
          audience: tags.map(t=>t.audience).join(', '), recurrence:'none',
          synthetic:true, weekId:wk.id, busyMidweek:busy
        }, date:itemDate});
      });
    }
    if(wk.sundayDate){
      const ps = effectivePostService(wk);
      ps.forEach(m=>{
        const itemDate = m.date ? parseISO(m.date) : parseISO(wk.sundayDate);
        if(itemDate < rangeStart || itemDate > rangeEnd) return;
        if(state.termFilter && termOf(itemDate) !== state.termFilter) return;
        const tags = (m.tagIds||[]).map(tagById).filter(Boolean);
        if(!tags.length) return;
        const title = tags.map(t=>t.name).join(' + ') + (m.note?' — '+m.note:'');
        items.push({ev:{
          id:'wk-ps-'+wk.id+'-'+m.id, title,
          category:'tag', color:audienceColor(tags[0].audience), dominant:tags.some(t=>isDominantAudience(t.audience)),
          tags: tags.map(t=>({name:t.name, color:audienceColor(t.audience), dominant:isDominantAudience(t.audience)})),
          audience: tags.map(t=>t.audience).join(', '), recurrence:'none',
          synthetic:true, weekId:wk.id
        }, date:itemDate});
      });
    }
  });
  items.sort((a,b)=> a.date - b.date);
  return items;
}

// ---------- Rendering ----------
function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML = '<div class="empty">Loading your planner…</div>'; return; }
  if(!state.currentUser){ app.className='app'; app.innerHTML = loginHTML(); attachLoginHandlers(); return; }
  app.className = state.view==='dashboard' ? 'app wide' : 'app';
  app.innerHTML = mainHTML();
  attachMainHandlers();
}

function attachLoginHandlers(){
  const saveBtn = document.getElementById('save-user');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const name = document.getElementById('new-name').value.trim();
      const pin = document.getElementById('new-pin').value.trim();
      const err = document.getElementById('add-error');
      if(!name){ err.textContent='Enter a name.'; return; }
      if(!/^\d{4}$/.test(pin)){ err.textContent='PIN must be 4 digits.'; return; }
      const user = {id:uid(), name, pin};
      state.users.push(user);
      await saveUsers(user);
      state.currentUser = user;
      state.loginStep = 'pick';
      render();
    };
  }
  const cancelAdd = document.getElementById('cancel-add');
  if(cancelAdd) cancelAdd.onclick = ()=>{ state.loginStep='pick'; render(); };

  const addNew = document.getElementById('add-new-user');
  if(addNew) addNew.onclick = ()=>{ state.loginStep='add'; render(); };

  document.querySelectorAll('.user-chip').forEach(el=>{
    el.onclick = ()=>{
      state.pendingUser = state.users.find(u=>u.id===el.dataset.id);
      state.loginStep = 'pin'; state.pinBuffer=''; state.pinError='';
      render();
    };
  });

  document.querySelectorAll('.pin-key').forEach(el=>{
    el.onclick = ()=>{
      if(state.pinBuffer.length>=4) return;
      state.pinBuffer += el.dataset.n;
      if(state.pinBuffer.length===4){
        if(state.pinBuffer === state.pendingUser.pin){
          state.currentUser = state.pendingUser;
          state.pendingUser=null; state.loginStep='pick'; state.pinBuffer='';
          render();
        } else {
          state.pinError = 'Wrong PIN, try again.';
          state.pinBuffer='';
          render();
        }
      } else render();
    };
  });
  const back = document.getElementById('pin-back');
  if(back) back.onclick = ()=>{ state.pinBuffer = state.pinBuffer.slice(0,-1); render(); };
  const notYou = document.getElementById('not-you');
  if(notYou) notYou.onclick = ()=>{ state.pendingUser=null; state.loginStep='pick'; state.pinError=''; render(); };
}

function calendarHTML(){
  const y = state.cursor.getFullYear(), m = state.cursor.getMonth();
  const first = new Date(y,m,1);
  const startOffset = (first.getDay()+6)%7; // Mon=0
  const gridStart = new Date(y,m,1-startOffset);
  const cells = [];
  for(let i=0;i<42;i++){ cells.push(new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate()+i)); }
  const rangeStart = cells[0], rangeEnd = cells[41];
  const occ = eventsForRange(rangeStart, rangeEnd);
  const byDay = {};
  occ.forEach(o=>{ const k=isoDate(o.date); (byDay[k]=byDay[k]||[]).push(o); });
  const today = isoDate(new Date());

  let html = `<div class="cal-grid">`;
  DOW.forEach(d=> html += `<div class="cal-dow">${d}</div>`);
  cells.forEach(d=>{
    const k = isoDate(d);
    const inMonth = d.getMonth()===m;
    const dayEvents = byDay[k]||[];
    const isBusy = dayEvents.some(o=>o.ev.busyMidweek);
    html += `<div class="cal-cell ${inMonth?'':'other-month'} ${k===today?'today':''} ${isBusy?'busy':''}">
      <div class="cal-date">${d.getDate()}</div>
      <div class="cal-events">
        ${dayEvents.slice(0,3).map(o=>`<div class="ev-pill ${o.ev.color?'tag':o.ev.category}${o.ev.dominant?' dominant':''}" data-id="${o.ev.id}" style="${o.ev.color?'background:'+o.ev.color+';':''}" title="${o.ev.audience||''}">${o.ev.title}</div>`).join('')}
        ${dayEvents.length>3?`<div style="font-size:10px;color:var(--ink-soft);">+${dayEvents.length-3} more</div>`:''}
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function listHTML(){
  const rangeStart = new Date(state.cursor.getFullYear(), state.cursor.getMonth(), 1);
  const rangeEnd = new Date(state.cursor.getFullYear(), state.cursor.getMonth()+6, 0);
  const occ = eventsForRange(rangeStart, rangeEnd);
  if(occ.length===0) return `<div class="empty">No dates on the sheet yet.<br>Tap "Add to planner" to pin your first one.</div>`;
  const byMonth = {};
  occ.forEach(o=>{
    const key = `${o.date.getFullYear()}-${o.date.getMonth()}`;
    (byMonth[key]=byMonth[key]||[]).push(o);
  });
  return Object.entries(byMonth).map(([key, items])=>{
    const [y,m] = key.split('-').map(Number);
    return `<div class="list-month">
      <h3>${MONTHS[m]} ${y}</h3>
      ${items.map(o=>`
        <div class="list-row${o.ev.category==='tag'?' indented':''}" data-id="${o.ev.id}">
          <div class="list-date">${DOW[(o.date.getDay()+6)%7]} ${o.date.getDate()}</div>
          <div class="list-dot ${o.ev.color?'':o.ev.category}" style="${o.ev.color?'background:'+o.ev.color+';':''}"></div>
          <div class="list-title">${o.ev.title}${o.ev.busyMidweek?'<span class="busy-flag">Busy midweek</span>':''}</div>
          ${o.ev.tags ? o.ev.tags.map(t=>`<span class="list-tag-chip${t.dominant?' dominant':''}" style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}66;">${t.name}</span>`).join('') : ''}
          <div class="list-meta">${o.ev.audience || (CATS[o.ev.category]?CATS[o.ev.category].label:'')}${o.ev.recurrence!=='none'?' · '+o.ev.recurrence:''}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

const RHYTHM_SUGGESTIONS = ['Small Group','Prayer','Margin Week','Team Development','Meetings Week','Alpha'];

function visibleWeeks(){
  let ws = state.weeks.slice().sort((a,b)=> a.sundayDate < b.sundayDate ? -1 : 1);
  if(state.termFilter) ws = ws.filter(w=> w.sundayDate && termOf(parseISO(w.sundayDate))===state.termFilter);
  return ws;
}

function fmtDate(iso){
  if(!iso) return '';
  const d = parseISO(iso);
  return `${DOW[(d.getDay()+6)%7]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
}

// Shared row markup for both the midweek and post-service activity editors — same
// classes/behaviour either way; the two sections are told apart by a data-section

function activityRowsHTML(rows, dateHint){
  return rows.map(r=>{

    return `
    <div class="mw-row" data-mwid="${r.id}" data-recurring-id="${r.recurringId||''}" data-newtag="${isNewTag?'1':'0'}">
      <div class="mw-tags-line">

          <input class="mw-newtag-name" data-mwid="${r.id}" placeholder="New tag name" value="${(r.newTagName||'').replace(/"/g,'&quot;')}">
          <select class="mw-newtag-audience" data-mwid="${r.id}">
            ${state.audiences.map(a=>`<option value="${a.name}" ${(r.newTagAudience||state.audiences[0].name)===a.name?'selected':''}>${a.name}</option>`).join('')}
          </select>
          <button class="mw-cancel-newtag" data-mwid="${r.id}" type="button" title="Back to picking tags">↩ back</button>
        ` : showPicker ? `
          ${state.tags.map(t=>{
            const on = tagIds.includes(t.id);
            return `<button type="button" class="mw-tag-toggle ${on?'on':''}" data-mwid="${r.id}" data-tagid="${t.id}" ${r.recurringId?'disabled':''} style="${on?'background:'+audienceColor(t.audience)+';color:#fff;border-color:transparent;':''}">${t.name}</button>`;
          }).join('')}
          ${!r.recurringId ? `<button type="button" class="mw-tag-toggle mw-tag-toggle-new" data-mwid="${r.id}">+ New tag…</button>` : ''}
          ${tagIds.length && !r.recurringId ? `<button type="button" class="mw-tags-done" data-mwid="${r.id}">✓ Done</button>` : ''}
        ` : `
          ${tagIds.map(tid=>{
            const t = tagById(tid);
            if(!t) return '';
            return `<span class="mw-tag-chip" style="background:${audienceColor(t.audience)};">${t.name}</span>`;
          }).join('')}
          <button type="button" class="mw-tags-edit" data-mwid="${r.id}">Change tags</button>
        `}
      </div>
      <div class="mw-meta-line">

              <option value="weekly:4" ${r.repeatFreq==='weekly:4'?'selected':''}>Every 4 weeks</option>
              <option value="monthly:1" ${r.repeatFreq==='monthly:1'?'selected':''}>Monthly</option>
            </select>`}
        <button class="mw-remove" data-mwid="${r.id}" title="${r.recurringId?'Remove for this week only':'Remove'}">✕</button>
      </div>

        <div style="display:flex;gap:8px;align-items:center;">

            <option value="none" ${ev.recurrence==='none'?'selected':''}>Doesn't repeat</option>
            <option value="daily" ${ev.recurrence==='daily'?'selected':''}>Daily</option>
            <option value="weekly" ${ev.recurrence==='weekly'?'selected':''}>Weekly</option>
            <option value="monthly" ${ev.recurrence==='monthly'?'selected':''}>Monthly</option>
          </select>
          <span id="f-interval-wrap" style="display:${ev.recurrence==='none'?'none':'flex'};align-items:center;gap:6px;white-space:nowrap;">
            <span style="font-size:12px;color:var(--ink-soft);">every</span>
            <input type="number" id="f-interval" min="1" max="52" value="${ev.recurrenceInterval||1}" style="width:52px;padding:9px 6px;text-align:center;">
          </span>
        </div>
      </div>
      <div class="field" id="end-field" style="${ev.recurrence==='none'?'display:none;':''}">
        <label>Ends</label>
        <select id="f-endtype">
          <option value="never" ${endType==='never'?'selected':''}>Never</option>
          <option value="after" ${endType==='after'?'selected':''}>After a number of times</option>
          <option value="byDate" ${endType==='byDate'?'selected':''}>On a date</option>
        </select>
        <div id="f-end-after-wrap" style="${endType==='after'?'':'display:none;'}margin-top:8px;display:flex;align-items:center;gap:6px;">
          <input type="number" id="f-end-count" min="1" value="${ev.recurrenceCount||10}" style="width:60px;">
          <span style="font-size:12px;color:var(--ink-soft);">occurrences</span>
        </div>
        <div id="f-end-date-wrap" style="${endType==='byDate'?'':'display:none;'}margin-top:8px;">
          <input type="date" id="f-end" value="${ev.recurrenceEnd||''}">
        </div>
      </div>
      <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Location, leader, anything to remember">${ev.notes||''}</textarea></div>
      <div class="modal-actions">
        <div>${isEdit?'<button class="btn danger" id="delete-ev">Delete</button>':''}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="cancel-modal">Cancel</button>
          <button class="btn primary" id="save-ev">${isEdit?'Save changes':'Pin to planner'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function attachMainHandlers(){
  document.getElementById('switch-user').onclick = ()=>{ state.currentUser=null; render(); };
  document.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{
      const t = el.dataset.term;
      state.termFilter = state.termFilter===t ? null : t;
      render();
    };
  });
  document.querySelectorAll('.view-toggle button').forEach(el=>{
    el.onclick = ()=>{ state.view = el.dataset.view; render(); };
  });
  const prevBtn = document.getElementById('prev-month');
  const nextBtn = document.getElementById('next-month');
  if(prevBtn) prevBtn.onclick = ()=>{
    const step = state.view==='calendar'?1:6;
    state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth()-step, 1);
    render();
  };
  if(nextBtn) nextBtn.onclick = ()=>{
    const step = state.view==='calendar'?1:6;
    state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth()+step, 1);
    render();
  };
  document.querySelectorAll('.chip').forEach(el=>{
    el.onclick = ()=>{
      const c = el.dataset.cat;
      if(state.catFilters.has(c)) state.catFilters.delete(c); else state.catFilters.add(c);
      render();
    };
  });
  const openAdd = document.getElementById('open-add');
  if(openAdd) openAdd.onclick = ()=>{
    state.editingEvent = null; state.showModal = true; render();
  };
  document.querySelectorAll('.ev-pill, .list-row').forEach(el=>{
    el.onclick = ()=>{
      if(el.dataset.id && el.dataset.id.startsWith('wk-')){
        state.view = 'dashboard'; render(); return;
      }
      const ev = state.events.find(e=>e.id===el.dataset.id);
      if(ev){ state.editingEvent = {...ev}; state.showModal = true; render(); }
    };
  });
  if(state.view==='dashboard') attachDashboardHandlers();
  const openSettings = document.getElementById('open-settings');
  if(openSettings) openSettings.onclick = ()=>{ state.showSettings = true; render(); };
  const settingsOverlay = document.getElementById('settings-overlay');
  if(settingsOverlay){
    document.getElementById('close-settings').onclick = ()=>{ state.showSettings=false; render(); };
    document.querySelectorAll('.tag-name').forEach(el=>{
      el.onchange = async ()=>{
        const tag = tagById(el.dataset.id);
        if(tag){ tag.name = el.value.trim() || tag.name; await saveTags(tag); }
      };
    });
    document.querySelectorAll('.tag-audience').forEach(el=>{
      el.onchange = async ()=>{
        const tag = tagById(el.dataset.id);
        if(tag){ tag.audience = el.value; await saveTags(tag); render(); }
      };
    });
    document.querySelectorAll('.tag-remove').forEach(el=>{
      el.onclick = async ()=>{
        await deleteTagRemote(el.dataset.id);
        state.tags = state.tags.filter(t=>t.id!==el.dataset.id);
        render();
      };
    });
    const addTagBtn = document.getElementById('add-tag');
    if(addTagBtn) addTagBtn.onclick = async ()=>{
      const newTag = {id:uid(), name:'New tag', audience: (state.audiences[0] && state.audiences[0].name) || 'Whole Church'};
      state.tags.push(newTag);
      await saveTags(newTag); render();
    };
    document.querySelectorAll('.audience-remove').forEach(el=>{
      el.onclick = async ()=>{
        const inUse = state.tags.some(t=>t.audience===el.dataset.audience);
        if(inUse){ alert('This audience is used by at least one tag — reassign that tag first.'); return; }
        await deleteAudienceRemote(el.dataset.audience);
        state.audiences = state.audiences.filter(a=>a.name!==el.dataset.audience);
        render();
      };
    });
    document.querySelectorAll('.audience-color').forEach(el=>{
      el.onchange = async ()=>{
        const a = audienceObj(el.dataset.audience);
        if(a){ a.color = el.value; await saveAudiences(a); render(); }
      };
    });
    const addAudienceBtn = document.getElementById('add-audience');
    if(addAudienceBtn) addAudienceBtn.onclick = async ()=>{
      const input = document.getElementById('new-audience-name');
      const val = input.value.trim();
      if(!val || state.audiences.some(a=>a.name===val)) return;
      const nextColor = TAG_PALETTE[state.audiences.length % TAG_PALETTE.length];
      const newAud = {name:val, color:nextColor};
      state.audiences.push(newAud);
      await saveAudiences(newAud); render();
    };
    document.querySelectorAll('.rr-tag-toggle').forEach(el=>{
      el.onclick = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(!r) return;
        r.tagIds = r.tagIds || (r.tagId ? [r.tagId] : []);
        const tid = el.dataset.tagid;
        if(r.tagIds.includes(tid)) r.tagIds = r.tagIds.filter(x=>x!==tid);
        else r.tagIds.push(tid);
        await saveRecurring(r); render();
      };
    });
    document.querySelectorAll('.rr-dayoffset').forEach(el=>{
      el.onchange = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(r){ r.dayOffset = parseInt(el.value,10)||0; await saveRecurring(r); render(); }
      };
    });
    document.querySelectorAll('.rr-start,.rr-end').forEach(el=>{
      el.onchange = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(!r) return;
        if(el.classList.contains('rr-start')) r.startDate = el.value;
        else r.endDate = el.value || null;
        await saveRecurring(r); render();
      };
    });
    document.querySelectorAll('.rr-freq').forEach(el=>{
      el.onchange = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(r){ r.freq = el.value; await saveRecurring(r); render(); }
      };
    });
    document.querySelectorAll('.rr-interval').forEach(el=>{
      el.onchange = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(r){ r.interval = Math.max(1, parseInt(el.value,10)||1); await saveRecurring(r); }
      };
    });
    document.querySelectorAll('.rr-endtype').forEach(el=>{
      el.onchange = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(r){ r.endType = el.value; await saveRecurring(r); render(); }
      };
    });
    document.querySelectorAll('.rr-count').forEach(el=>{
      el.onchange = async ()=>{
        const r = state.recurringRhythms.find(x=>x.id===el.dataset.rid);
        if(r){ r.occurrenceCount = Math.max(1, parseInt(el.value,10)||1); await saveRecurring(r); }
      };
    });
    document.querySelectorAll('.rr-remove').forEach(el=>{
      el.onclick = async ()=>{
        await deleteRecurringRemote(el.dataset.rid);
        state.recurringRhythms = state.recurringRhythms.filter(r=>r.id!==el.dataset.rid);
        render();
      };
    });
  }
  const overlay = document.getElementById('modal-overlay');
  if(overlay){
    document.getElementById('cancel-modal').onclick = ()=>{ state.showModal=false; state.editingEvent=null; render(); };
    document.querySelectorAll('.cat-opt').forEach(el=>{
      el.onclick = ()=>{
        document.querySelectorAll('.cat-opt').forEach(o=>o.classList.remove('on'));
        el.classList.add('on');
        el.dataset.selected = 'true';
      };
    });
    document.getElementById('f-recurrence').onchange = (e)=>{
      const on = e.target.value !== 'none';
      document.getElementById('end-field').style.display = on ? 'block':'none';
      document.getElementById('f-interval-wrap').style.display = on ? 'flex':'none';
    };
    document.getElementById('f-endtype').onchange = (e)=>{
      document.getElementById('f-end-after-wrap').style.display = e.target.value==='after' ? 'flex':'none';
      document.getElementById('f-end-date-wrap').style.display = e.target.value==='byDate' ? 'block':'none';
    };
    const delBtn = document.getElementById('delete-ev');
    if(delBtn) delBtn.onclick = async ()=>{
      await deleteEventRemote(state.editingEvent.id);
      state.events = state.events.filter(e=>e.id!==state.editingEvent.id);
      state.showModal=false; state.editingEvent=null; render();
    };
    document.getElementById('save-ev').onclick = async ()=>{
      const title = document.getElementById('f-title').value.trim();
      if(!title) return;
      const catEl = document.querySelector('.cat-opt.on');
      const category = catEl ? catEl.dataset.cat : 'small-group';
      const date = document.getElementById('f-date').value;
      const recurrence = document.getElementById('f-recurrence').value;
      const recurrenceInterval = Math.max(1, parseInt(document.getElementById('f-interval').value,10)||1);
      const recurrenceEndType = document.getElementById('f-endtype').value;
      const recurrenceCount = Math.max(1, parseInt(document.getElementById('f-end-count').value,10)||10);
      const recurrenceEnd = document.getElementById('f-end').value || null;
      const notes = document.getElementById('f-notes').value.trim();
      const payload = {title, category, date, recurrence, recurrenceInterval, recurrenceEndType, recurrenceCount, recurrenceEnd, notes};
      let savedEvent;
      if(state.editingEvent && state.editingEvent.id){
        const idx = state.events.findIndex(e=>e.id===state.editingEvent.id);
        state.events[idx] = {...state.events[idx], ...payload};
        savedEvent = state.events[idx];
      } else {
        savedEvent = {id:uid(), ...payload, createdBy: state.currentUser.name};
        state.events.push(savedEvent);
      }
      await saveEvents(savedEvent);
      state.showModal=false; state.editingEvent=null; render();
    };
  }
}

// Reads any in-progress typing in the midweek rows back into state.editingMidweekRows
// before we mutate the row list and re-render, so nothing typed gets lost.
// A row's id is unique regardless of which section it belongs to, so we can find it
// by searching both editing arrays rather than needing to inspect the DOM for section.
function findEditingRow(id){
  let entry = (state.editingMidweekRows||[]).find(r=>r.id===id);
  if(entry) return {entry, section:'midweek'};
  entry = (state.editingPostServiceRows||[]).find(r=>r.id===id);
  if(entry) return {entry, section:'postService'};
  return {entry:null, section:null};
}

function syncAllActivityRowsFromDOM(){
  const card = document.querySelector('.week-card.editing');
  if(!card) return;
  const topGet = f => card.querySelector(`[data-field="${f}"]`)?.value ?? '';
  state.editingFieldValues = {
    occasion: topGet('occasion'), sundayDate: topGet('sundayDate'), sundaySeries: topGet('sundaySeries'),
    weekCommencing: topGet('weekCommencing'), happening: topGet('happening')
  };
  card.querySelectorAll('.mw-row').forEach(row=>{
    const {entry} = findEditingRow(row.dataset.mwid);
    if(!entry) return;
    const noteInp = row.querySelector('.mw-note');
    if(noteInp && !noteInp.disabled) entry.note = noteInp.value;
    const dateInp = row.querySelector('.mw-date');
    if(dateInp) entry.date = dateInp.value;
    const newNameInp = row.querySelector('.mw-newtag-name');
    if(newNameInp) entry.newTagName = newNameInp.value;
    const newAudSel = row.querySelector('.mw-newtag-audience');
    if(newAudSel) entry.newTagAudience = newAudSel.value;
    const freqSel = row.querySelector('.mw-repeat-freq');
    if(freqSel) entry.repeatFreq = freqSel.value;
  });
}

function attachDashboardHandlers(){
  document.querySelectorAll('.mw-tag-toggle:not(.mw-tag-toggle-new)').forEach(el=>{
    el.onclick = ()=>{
      if(el.disabled) return;
      syncAllActivityRowsFromDOM();
      const {entry} = findEditingRow(el.dataset.mwid);
      if(!entry) return;
      entry.tagIds = entry.tagIds || [];
      const tid = el.dataset.tagid;
      if(entry.tagIds.includes(tid)) entry.tagIds = entry.tagIds.filter(x=>x!==tid);
      else entry.tagIds.push(tid);
      render();
    };
  });
  document.querySelectorAll('.mw-tag-toggle-new').forEach(el=>{
    el.onclick = ()=>{
      syncAllActivityRowsFromDOM();
      const {entry} = findEditingRow(el.dataset.mwid);
      if(entry) entry.creatingTag = true;
      render();
    };
  });
  document.querySelectorAll('.mw-tags-edit').forEach(el=>{
    el.onclick = ()=>{
      syncAllActivityRowsFromDOM();
      const {entry} = findEditingRow(el.dataset.mwid);
      if(entry) entry.pickerOpen = true;
      render();
    };
  });
  document.querySelectorAll('.mw-tags-done').forEach(el=>{
    el.onclick = ()=>{
      syncAllActivityRowsFromDOM();
      const {entry} = findEditingRow(el.dataset.mwid);
      if(entry) entry.pickerOpen = false;
      render();
    };
  });
  document.querySelectorAll('.mw-cancel-newtag').forEach(el=>{
    el.onclick = ()=>{
      syncAllActivityRowsFromDOM();
      const {entry} = findEditingRow(el.dataset.mwid);
      if(entry){ entry.creatingTag=false; entry.newTagName=''; }
      render();
    };
  });
  document.querySelectorAll('.edit-week').forEach(el=>{
    el.onclick = ()=>{
      const wk = state.weeks.find(w=>w.id===el.dataset.id);
      const mw = wk ? effectiveMidweek(wk) : [];
      const ps = wk ? effectivePostService(wk) : [];
      state.editingMidweekRows = mw.length ? mw.map(m=>({...m})) : [{id:uid(), tagIds:[], note:''}];
      state.editingPostServiceRows = ps.length ? ps.map(m=>({...m})) : [{id:uid(), tagIds:[], note:''}];
      state.editingOriginalRecurringIds = new Set(mw.filter(m=>m.recurringId).map(m=>m.recurringId));
      state.editingOriginalPostServiceRecurringIds = new Set(ps.filter(m=>m.recurringId).map(m=>m.recurringId));
      state.editingFieldValues = null;
      state.editingWeekId = el.dataset.id;
      render();
    };
  });
  document.querySelectorAll('.cancel-week').forEach(el=>{
    el.onclick = ()=>{
      state.editingWeekId = null; state.editingMidweekRows = null; state.editingPostServiceRows = null;
      state.editingOriginalRecurringIds = null; state.editingOriginalPostServiceRecurringIds = null;
      state.editingFieldValues = null;
      render();
    };
  });
  document.querySelectorAll('.delete-week').forEach(el=>{
    el.onclick = async ()=>{
      if(el.dataset.id!=='new'){
        await deleteWeekRemote(el.dataset.id);
        state.weeks = state.weeks.filter(w=>w.id!==el.dataset.id);
      }
      state.editingWeekId = null; state.editingMidweekRows = null; state.editingPostServiceRows = null;
      state.editingOriginalRecurringIds = null; state.editingOriginalPostServiceRecurringIds = null;
      state.editingFieldValues = null;
      render();
    };
  });
  document.querySelectorAll('.mw-remove').forEach(el=>{
    el.onclick = ()=>{
      syncAllActivityRowsFromDOM();
      const id = el.dataset.mwid;
      const {section} = findEditingRow(id);
      if(section==='midweek'){
        state.editingMidweekRows = state.editingMidweekRows.filter(r=>r.id!==id);
        if(!state.editingMidweekRows.length) state.editingMidweekRows.push({id:uid(), tagIds:[], note:''});
      } else if(section==='postService'){
        state.editingPostServiceRows = state.editingPostServiceRows.filter(r=>r.id!==id);
        if(!state.editingPostServiceRows.length) state.editingPostServiceRows.push({id:uid(), tagIds:[], note:''});
      }
      render();
    };
  });
  const mwAddBtn = document.getElementById('mw-add-row');
  if(mwAddBtn) mwAddBtn.onclick = ()=>{
    syncAllActivityRowsFromDOM();
    state.editingMidweekRows.push({id:uid(), tagIds:[], note:''});
    render();
  };
  const psAddBtn = document.getElementById('ps-add-row');
  if(psAddBtn) psAddBtn.onclick = ()=>{
    syncAllActivityRowsFromDOM();
    state.editingPostServiceRows.push({id:uid(), tagIds:[], note:''});
    render();
  };
  document.querySelectorAll('.save-week').forEach(el=>{
    el.onclick = async ()=>{
      const card = el.closest('.week-card');
      const get = f => card.querySelector(`[data-field="${f}"]`)?.value.trim() || '';
      const data = {
        occasion: get('occasion'), sundayDate: get('sundayDate'), sundaySeries: get('sundaySeries'),
        weekCommencing: get('weekCommencing'), happening: get('happening')
      };
      if(!data.sundayDate){ card.querySelector('[data-field="sundayDate"]').style.boxShadow = '0 0 0 2px var(--bad)'; return; }

      // Processes one section's rows (midweek or post-service) — same logic either way,
      // just anchored to a different date and tagged with a different rhythm "slot".
      function processSection(sectionName, anchorDate){
        const items = [];
        const stillPresentRecurring = new Set();
        const newRecurringTemplates = [];
        const newTags = [];
        const container = card.querySelector(`.mw-rows[data-section="${sectionName}"]`);
        if(!container) return {items, stillPresentRecurring, newRecurringTemplates, newTags};
        container.querySelectorAll('.mw-row').forEach(row=>{
          const mwid = row.dataset.mwid;
          const recurringId = row.dataset.recurringId || '';
          if(recurringId){ stillPresentRecurring.add(recurringId); return; }
          const {entry} = findEditingRow(mwid);
          let tagIds = ((entry && entry.tagIds) || []).slice();
          const isNewTag = row.dataset.newtag === '1';
          if(isNewTag){
            const nameInp = row.querySelector('.mw-newtag-name');
            const name = nameInp ? nameInp.value.trim() : '';
            if(name){
              const audSel = row.querySelector('.mw-newtag-audience');
              const audience = audSel ? audSel.value : ((state.audiences[0] && state.audiences[0].name) || 'Whole Church');
              const newTag = {id:uid(), name, audience};
              state.tags.push(newTag);
              newTags.push(newTag);
              tagIds.push(newTag.id);
            }
          }
          if(!tagIds.length) return;
          const note = row.querySelector('.mw-note') ? row.querySelector('.mw-note').value.trim() : '';
          const dateInp = row.querySelector('.mw-date');
          const date = dateInp ? dateInp.value : '';
          const freqSel = row.querySelector('.mw-repeat-freq');
          const freqVal = freqSel ? freqSel.value : '';
          if(freqVal){
            const [freq, intervalStr] = freqVal.split(':');
            newRecurringTemplates.push({
              id:uid(), tagIds, note, startDate: anchorDate,
              endDate:null, freq, interval: parseInt(intervalStr,10)||1, endType:'never', occurrenceCount:null,
              dayOffset:0, slot: sectionName
            });
          } else {
            items.push({id:mwid, tagIds, note, date: date || null});
          }
        });
        return {items, stillPresentRecurring, newRecurringTemplates, newTags};
      }

      const mwResult = processSection('midweek', data.weekCommencing || data.sundayDate);
      const psResult = processSection('postService', data.sundayDate);

      const allNewTags = [...mwResult.newTags, ...psResult.newTags];
      if(allNewTags.length) await saveTags(allNewTags);

      // work out which recurring items (either section) were removed for this week only
      const originally = new Set([
        ...(state.editingOriginalRecurringIds || []),
        ...(state.editingOriginalPostServiceRecurringIds || [])
      ]);
      const stillPresent = new Set([...mwResult.stillPresentRecurring, ...psResult.stillPresentRecurring]);
      const removedThisWeek = [...originally].filter(id=>!stillPresent.has(id));

      const allNewRecurringTemplates = [...mwResult.newRecurringTemplates, ...psResult.newRecurringTemplates];
      if(allNewRecurringTemplates.length){
        state.recurringRhythms.push(...allNewRecurringTemplates);
        await saveRecurring(allNewRecurringTemplates);
      }

      let savedWeek;
      if(el.dataset.id==='new'){
        savedWeek = {id: uid(), ...data, midweek: mwResult.items, postService: psResult.items, excludedRecurring: removedThisWeek};
        state.weeks.push(savedWeek);
      } else {
        const idx = state.weeks.findIndex(w=>w.id===el.dataset.id);
        if(idx>-1){
          const prevExcluded = state.weeks[idx].excludedRecurring || [];
          const mergedExcluded = Array.from(new Set([...prevExcluded, ...removedThisWeek]));
          state.weeks[idx] = {...state.weeks[idx], ...data, midweek: mwResult.items, postService: psResult.items, excludedRecurring: mergedExcluded};
          savedWeek = state.weeks[idx];
        }
      }
      if(savedWeek) await saveWeeks(savedWeek);
      state.editingWeekId = null;
      state.editingMidweekRows = null; state.editingPostServiceRows = null;
      state.editingOriginalRecurringIds = null; state.editingOriginalPostServiceRecurringIds = null;
      state.editingFieldValues = null;
      render();
    };
  });
  const addWeekBtn = document.getElementById('add-week');
  if(addWeekBtn) addWeekBtn.onclick = ()=>{
    state.editingWeekId = 'new';
    state.editingMidweekRows = [{id:uid(), tagIds:[], note:''}];
    state.editingPostServiceRows = [{id:uid(), tagIds:[], note:''}];
    state.editingOriginalRecurringIds = new Set();
    state.editingOriginalPostServiceRecurringIds = new Set();
    state.editingFieldValues = null;
    render();
    const el = document.querySelector('.week-card.editing');
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  };
  const fillBtn = document.getElementById('fill-weeks');
  if(fillBtn) fillBtn.onclick = async ()=>{
    const term = state.termFilter || termOf(new Date());
    const [start, end] = termDateRange(term, new Date());
    const sundays = allSundaysInRange(start, end);
    const existing = new Set(state.weeks.map(w=>w.sundayDate));
    const added = [];
    sundays.forEach(s=>{
      const iso = isoDate(s);
      if(!existing.has(iso)){
        const wc = new Date(s.getFullYear(), s.getMonth(), s.getDate()+1);
        const w = {id:uid(), occasion:'', sundayDate:iso, sundaySeries:'', weekCommencing:isoDate(wc), happening:'', midweek:[], postService:[], excludedRecurring:[]};
        state.weeks.push(w);
        added.push(w);
      }
    });
    if(added.length){ await saveWeeks(added); render(); }
    else alert('All Sundays for this term are already on the sheet.');
  };
}

(async ()=>{
  await loadData();
  render();
  subscribeRealtime();
})();
</script>
</body>
</html>
